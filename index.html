<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>রমাদানTy - আজান সহ রমজান ক্যালেন্ডার</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">রমাদান<span>Ty</span></div>
      <div class="current-time" id="digitalClock">--:--:-- --</div>
    </div>

    <!-- Location -->
    <div class="location-section">
      <select id="division" class="division-select">
        <option value="Dhaka">ঢাকা</option>
        <option value="Chittagong">চট্টগ্রাম</option>
        <option value="Khulna">খুলনা</option>
        <option value="Rajshahi">রাজশাহী</option>
        <option value="Barisal">বরিশাল</option>
        <option value="Sylhet">সিলেট</option>
        <option value="Rangpur">রংপুর</option>
        <option value="Mymensingh">ময়মনসিংহ</option>
      </select>
    </div>

    <!-- Azan Status -->
    <div class="azan-status" id="azanStatus">আজান সক্রিয়</div>

    <!-- Main Countdown -->
    <div class="countdown-card">
      <div class="countdown-timer" id="nextEventTimer">--:--:--</div>
      <div class="countdown-event" id="nextEventName">সেহরি</div>
    </div>

    <!-- Sehri & Iftar -->
    <div class="row">
      <div class="time-card">
        <div class="time-card-title">সেহরি শেষ</div>
        <div class="time-card-value" id="sehriTime">--:--</div>
      </div>
      <div class="time-card">
        <div class="time-card-title">ইফতার</div>
        <div class="time-card-value" id="iftarTime">--:--</div>
      </div>
    </div>

    <!-- Prayer Times with Azan Indicators -->
    <div class="prayer-grid" id="prayerTimesGrid"></div>

    <!-- Azan Control -->
    <div class="azan-control">
      <button class="azan-toggle-btn" id="toggleAzan">আজান চালু</button>
    </div>

    <!-- Audio for Adhan - Multiple sources for reliability -->
    <audio id="adhanAudio" preload="auto">
      <source src="https://www.islamcan.com/audio/adhan/azan1.mp3" type="audio/mpeg">
      <source src="https://www.islamcan.com/audio/adhan/azan1.ogg" type="audio/ogg">
      <source src="https://download.quranicaudio.com/qad/adan_makkah.mp3" type="audio/mpeg">
    </audio>

    <!-- Fallback Audio for reliability -->
    <audio id="adhanFallbackAudio" preload="auto" style="display:none">
      <source src="https://www.islamcan.com/audio/adhan/azan1.mp3" type="audio/mpeg">
    </audio>

    <div class="footer-note">
      <p>বাংলাদেশ সময় | পাঁচ ওয়াক্ত আজান</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
